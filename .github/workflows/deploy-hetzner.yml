name: Deploy to Hetzner

on:
  push:
    branches:
      - main

concurrency:
  group: projectbt-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/projectbt_deploy
          chmod 600 ~/.ssh/projectbt_deploy
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on Hetzner
        run: |
          ssh -i ~/.ssh/projectbt_deploy "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" << 'EOF'
            set -e

            cd /opt/apps/projectbt

            git fetch --prune origin
            git reset --hard origin/main

            git submodule sync --recursive
            git submodule update --init --recursive

            echo "Current submodule status:"
            git submodule status

            echo "Available backend migrations:"
            ls -la backendbt/prisma/migrations

            echo "Starting database..."
            docker compose up -d db

            echo "Waiting for database health..."
            for i in $(seq 1 60); do
              STATUS="$(docker inspect -f '{{.State.Health.Status}}' projectbt-db-1 2>/dev/null || true)"
              if [ "$STATUS" = "healthy" ]; then
                echo "Database is healthy"
                break
              fi
              echo "Waiting for database... status=$STATUS"
              sleep 2
            done

            STATUS="$(docker inspect -f '{{.State.Health.Status}}' projectbt-db-1 2>/dev/null || true)"
            if [ "$STATUS" != "healthy" ]; then
              echo "Database is not healthy after waiting"
              docker compose logs db --tail=80
              exit 1
            fi

            # Create a MySQL backup before applying production migrations.
            echo "Creating database backup before migration..."
            mkdir -p backups/mysql
            BACKUP_FILE="backups/mysql/projectbt_$(date +%Y%m%d_%H%M%S)_before_deploy.sql"

            docker compose exec -T db sh -lc 'mysqldump -uroot -p"$MYSQL_ROOT_PASSWORD" "${MYSQL_DATABASE:-projectbt}"' > "$BACKUP_FILE"

            if [ ! -s "$BACKUP_FILE" ]; then
              echo "Database backup failed or backup file is empty"
              exit 1
            fi

            echo "Database backup created: $BACKUP_FILE"

            echo "Building backend image..."
            docker compose build backend

            # Use Prisma migrate deploy for production; set -e stops deployment if it fails.
            echo "Applying Prisma migrations..."
            docker compose run --rm backend npx prisma migrate deploy --schema prisma/schema

            echo "Building frontend image..."
            docker compose build frontend

            echo "Starting application services..."
            docker compose up -d backend frontend

            docker image prune -f

            docker compose ps
          EOF
