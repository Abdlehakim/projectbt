name: Deploy to Hetzner

on:
  push:
    branches:
      - main

concurrency:
  group: projectbt-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/projectbt_deploy
          chmod 600 ~/.ssh/projectbt_deploy
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on Hetzner
        run: |
          ssh -i ~/.ssh/projectbt_deploy "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" << 'EOF'
            set -e

            cd /opt/apps/projectbt

            git fetch origin main
            git reset --hard origin/main

            git submodule sync --recursive
            git submodule update --init --recursive

            docker compose up -d --build

            docker image prune -f

            docker compose ps
          EOF
